openapi: 3.1.0
info:
  title: Stowkeep API
  version: 0.0.0
  description: Self-hosted control plane for Docker Swarm.
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service is not ready
  /api/v1/version:
    get:
      summary: API version
      responses:
        "200":
          description: Version metadata
