name: Bug report
description: Report incorrect behavior or a regression
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Security issues should **not** be filed here — see [SECURITY.md](https://github.com/stowkeep/stowkeep/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug and expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install with SQLite / PostgreSQL
        2. Go to '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Stowkeep version
      placeholder: e.g. v0.1.0, main @ abc1234, or docker image tag
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite (embedded)
        - PostgreSQL
        - Unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Swarm mode (yes/no), browser if UI-related
      placeholder: Docker 27.x, Ubuntu 24.04, Swarm manager, Chrome 125
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact secrets, tokens, and passwords
      render: shell
    validations:
      required: false
