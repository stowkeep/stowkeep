name: Release Image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2

      - uses: docker/setup-qemu-action@2910921305d14a316e6589a8748321fee1a04162 # v3.6.0
      - uses: docker/setup-buildx-action@b5ca514318d6eac0d2cea4f93a334b3e6900072 # v3.10.0

      - uses: docker/login-action@9780b0c442fbb1117aed68952c9a4f4caa1a0575 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@8e5442f4f7f5ff6638bd6457bbae393a45979f6c # v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - id: build
        uses: docker/build-push-action@263435318d24625be040645e74ad701eb1dabd1 # v6.9.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@d7a6c564a3f0b4bf2712065ac9ecc9850d0a9367 # v3.9.0

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: SLSA provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" -o cyclonedx-json > sbom.json
          cosign attest --yes --predicate sbom.json --type cyclonedx "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
