name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web assets for embed
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run ./...

  lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web assets for embed
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Unit tests
        run: go test ./cmd/... ./pkg/... -short -race -count=1 -coverprofile=coverage.out
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./cmd/... ./pkg/...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G104 ./cmd/... ./pkg/...

  test-go-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stowkeep
          POSTGRES_PASSWORD: stowkeep
          POSTGRES_DB: stowkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stowkeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - name: PostgreSQL migration smoke
        env:
          STOWKEEP_DATABASE_URL: postgres://stowkeep:stowkeep@localhost:5432/stowkeep?sslmode=disable
        run: go test ./pkg/db/... -run TestMigrationsPostgresFromEnv -count=1

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm audit --omit=dev --audit-level=high

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Go build
        run: CGO_ENABLED=0 go build -o bin/stowkeep ./cmd/stowkeep

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t stowkeep:ci .
      - name: Health check smoke
        run: |
          cid=$(docker run -d -p 8080:8080 \
            -e STOWKEEP_DATABASE_DRIVER=sqlite \
            -e STOWKEEP_DATABASE_PATH=/tmp/stowkeep.db \
            stowkeep:ci)
          trap "docker rm -f $cid" EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1
      - name: Volume mount smoke (SQLite on /data)
        run: |
          vol=stowkeep-ci-data-$$
          cid=$(docker run -d -p 8081:8080 \
            -v "$vol:/data" \
            -e STOWKEEP_DATABASE_DRIVER=sqlite \
            -e STOWKEEP_DATABASE_PATH=/data/stowkeep.db \
            stowkeep:ci)
          trap "docker rm -f $cid; docker volume rm $vol" EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: stowkeep:ci
          severity: CRITICAL
          exit-code: 1

  test-go-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Initialize Swarm
        run: docker swarm init --advertise-addr 127.0.0.1 || true
      - name: Docker integration tests
        env:
          STOWKEEP_INTEGRATION_DOCKER: "1"
          STOWKEEP_DOCKER_HOST: unix:///var/run/docker.sock
        run: go test ./pkg/docker/... -tags=integration -race -count=1 -timeout 5m
