name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - uses: actions/setup-go@41dfa0f9b0c86a512a455a8499750c8548585a81 # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build web assets for embed
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c9041ea0de3d47a187f2448761339f3aa62291 # v6.0.1
        with:
          version: latest

  lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - uses: actions/setup-node@39370e3970a6d0505851389a6db6381064163a16 # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - uses: actions/setup-go@41dfa0f9b0c86a512a455a8499750c8548585a81 # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build web assets for embed
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Unit tests
        run: go test ./cmd/... ./pkg/... -short -race -count=1 -coverprofile=coverage.out
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./cmd/... ./pkg/...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G104 ./cmd/... ./pkg/...

  test-go-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stowkeep
          POSTGRES_PASSWORD: stowkeep
          POSTGRES_DB: stowkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stowkeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - uses: actions/setup-go@41dfa0f9b0c86a512a455a8499750c8548585a81 # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - name: PostgreSQL migration smoke
        env:
          STOWKEEP_DATABASE_URL: postgres://stowkeep:stowkeep@localhost:5432/stowkeep?sslmode=disable
        run: go test ./pkg/db/... -run TestMigrationsPostgresFromEnv -count=1

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - uses: actions/setup-node@39370e3970a6d0505851389a6db6381064163a16 # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm audit --omit=dev --audit-level=high

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - uses: actions/setup-go@41dfa0f9b0c86a512a455a8499750c8548585a81 # v5.1.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Go build
        run: CGO_ENABLED=0 go build -o bin/stowkeep ./cmd/stowkeep

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364cd4bcfa # v4.2.2
      - name: Build image
        run: docker build -t stowkeep:ci .
      - name: Health check smoke
        run: |
          cid=$(docker run -d -p 8080:8080 \
            -e STOWKEEP_DATABASE_DRIVER=sqlite \
            -e STOWKEEP_DATABASE_PATH=/tmp/stowkeep.db \
            stowkeep:ci)
          trap "docker rm -f $cid" EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1
      - name: Trivy scan
        uses: aquasecurity/trivy-action@915b19bbe8211718c4549e05555a781ef692b130 # v0.28.1
        with:
          image-ref: stowkeep:ci
          severity: CRITICAL
          exit-code: 1
