services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stowkeep
      POSTGRES_PASSWORD: stowkeep
      POSTGRES_DB: stowkeep
    volumes:
      - stowkeep-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stowkeep"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stowkeep-postgres:
